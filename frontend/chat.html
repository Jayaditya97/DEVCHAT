<!DOCTYPE html>
<html>

<head>

  <title>DevChat</title>

  <link
    rel="stylesheet"
    href="chat.css"
  />

</head>

<body>

<div class="container">

  <div class="sidebar">

    <h2>DevChat</h2>

    <p id="onlineUsers">
      Online Users: 0
    </p>

    <button onclick="logout()">
        Logout
    </button>

  </div>

  <div class="chat-container">

    <div id="messages"></div>

    <p id="typing"></p>

    <div class="input-area">

      <input
        type="text"
        id="messageInput"
        placeholder="Type message..."
      />

      <button onclick="sendMessage()">
        Send
      </button>

    </div>

  </div>

</div>

<script src=
"https://cdn.socket.io/4.7.2/socket.io.min.js">
</script>

<script src="chat.js"></script>

</body>
</html>
